<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Subtitle Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Smooth scrolling for automatic subtitle tracking */
    #subsContainer { scroll-behavior: smooth; }
    /* Compact custom scrollbars */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen w-screen flex flex-col overflow-hidden font-sans antialiased select-none">

  <header class="bg-gray-800 px-3 py-2 flex items-center justify-between border-b border-gray-700 shadow-md shrink-0">
    <div class="flex items-center space-x-2 w-full">
      <select id="videoSelect" class="w-full bg-gray-700 text-white rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500 appearance-none font-medium truncate">
        <option value="">Loading videos.json...</option>
      </select>
    </div>
  </header>

  <section class="w-full bg-black shrink-0 shadow-lg border-b border-gray-800">
    <div class="w-full aspect-video max-h-[30vh] bg-gray-950 relative mx-auto">
      <div id="player" class="w-full h-full"></div>
    </div>
  </section>

  <section class="flex-1 bg-gray-950 overflow-hidden flex flex-col">
    <div id="subsContainer" class="flex-1 overflow-y-auto px-3 py-3 space-y-1.5 select-text">
      <div class="text-gray-500 text-center mt-12 text-xs px-4">
        Tap the dropdown above to choose a video and load its subtitles.
      </div>
    </div>
  </section>

  <footer class="bg-gray-800 border-t border-gray-700 px-2 py-2.5 shrink-0 shadow-2xl">
    <div class="grid grid-cols-4 gap-2 max-w-md mx-auto">
      <button id="btnPrev" onclick="navigateSentence(-1)" class="flex flex-col items-center justify-center bg-gray-700 active:bg-gray-600 border border-gray-600 rounded py-1.5 text-[10px] font-bold uppercase tracking-wider text-gray-300 transition duration-100">
        <span class="text-base mb-0.5">⏮️</span> Prev
      </button>
      <button id="btnPlayPause" onclick="togglePlayPause()" class="flex flex-col items-center justify-center bg-blue-600 active:bg-blue-500 border border-blue-500 rounded py-1.5 text-[10px] font-bold uppercase tracking-wider text-white transition duration-100 shadow-md shadow-blue-500/10">
        <span id="playPauseIcon" class="text-base mb-0.5">▶️</span> <span id="playPauseText">Play</span>
      </button>
      <button id="btnReplay" onclick="replayCurrentSentence()" class="flex flex-col items-center justify-center bg-amber-600 active:bg-amber-500 border border-amber-500 rounded py-1.5 text-[10px] font-bold uppercase tracking-wider text-white transition duration-100 shadow-md shadow-amber-500/10">
        <span class="text-base mb-0.5">🔂</span> Replay
      </button>
      <button id="btnNext" onclick="navigateSentence(1)" class="flex flex-col items-center justify-center bg-gray-700 active:bg-gray-600 border border-gray-600 rounded py-1.5 text-[10px] font-bold uppercase tracking-wider text-gray-300 transition duration-100">
        <span class="text-base mb-0.5">⏭️</span> Next
      </button>
    </div>
  </footer>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    let player;
    let currentVideoId = "";
    let subtitleData = [];
    let highlightInterval;
    let lastActiveIndex = -1;
    let stopAtTime = null; // Used by the replay-and-stop logic

    document.addEventListener("DOMContentLoaded", loadVideoConfig);

    function loadVideoConfig() {
      fetch('videos.json')
        .then(res => {
          if(!res.ok) throw new Error("Could not fetch videos.json");
          return res.json();
        })
        .then(videos => {
          const select = document.getElementById('videoSelect');
          select.innerHTML = '<option value="">📱 Choose a Video...</option>';
          
          videos.forEach(video => {
            const opt = document.createElement('option');
            opt.value = video.id;
            opt.textContent = video.title;
            select.appendChild(opt);
          });
        })
        .catch(err => {
          console.error(err);
          document.getElementById('videoSelect').innerHTML = '<option value="">⚠️ videos.json error</option>';
        });
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: '', 
        playerVars: { 
          'playsinline': 1, 
          'rel': 0,
          'modestbranding': 1,
          'controls': 1
        },
        events: {
          'onStateChange': onPlayerStateChange
        }
      });
    }

    function onPlayerStateChange(event) {
      const icon = document.getElementById('playPauseIcon');
      const text = document.getElementById('playPauseText');

      if (event.data === YT.PlayerState.PLAYING) {
        icon.textContent = "⏸️";
        text.textContent = "Pause";
        clearInterval(highlightInterval);
        highlightInterval = setInterval(updateLiveHighlight, 100); 
      } else {
        icon.textContent = "▶️";
        text.textContent = "Play";
        clearInterval(highlightInterval);
      }
    }

    // Strict window matching logic
    function updateLiveHighlight() {
      if (!player || typeof player.getCurrentTime !== 'function' || subtitleData.length === 0) return;
      
      const currentTime = player.getCurrentTime();

      // Check if we reached a designated Replay hard-stop threshold
      if (stopAtTime !== null && currentTime >= stopAtTime) {
        player.pauseVideo();
        stopAtTime = null; 
        return;
      }

      let activeIndex = -1;
      for (let i = 0; i < subtitleData.length; i++) {
        if (currentTime >= subtitleData[i].startSeconds && currentTime <= subtitleData[i].endSeconds) {
          activeIndex = i;
          break; 
        }
      }

      if (activeIndex !== lastActiveIndex) {
        
        // 1. COMPLETELY RESET ALL ROWS
        subtitleData.forEach((_, index) => {
          const row = document.getElementById(`sub-row-${index}`);
          if (row) {
            row.className = "block bg-gray-900 border border-gray-800 rounded p-2 min-h-[38px]";
          }
        });

        // 2. APPLY HIGHLIGHT ONLY TO THE ACTIVE ROW
        if (activeIndex !== -1) {
          const newRow = document.getElementById(`sub-row-${activeIndex}`);
          if (newRow) {
            newRow.className = "block bg-blue-950/40 border-2 border-blue-500 rounded p-2 min-h-[38px] shadow-md shadow-blue-500/10";
            newRow.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }
        }
        
        lastActiveIndex = activeIndex;
      }
    }

    document.getElementById('videoSelect').addEventListener('change', function(e) {
      currentVideoId = e.target.value;
      if (!currentVideoId) return;

      lastActiveIndex = -1;
      stopAtTime = null; 
      if (player && typeof player.cueVideoById === 'function') {
        player.cueVideoById({ videoId: currentVideoId });
      }

      fetchSubtitles(`${currentVideoId}.srt`);
    });

    function fetchSubtitles(filename) {
      const container = document.getElementById('subsContainer');
      container.innerHTML = `<div class="text-gray-400 text-center mt-12 text-xs animate-pulse">Loading ${filename}...</div>`;

      fetch(filename)
        .then(res => {
          if(!res.ok) throw new Error();
          return res.text();
        })
        .then(srtText => parseSubtitles(srtText))
        .catch(() => {
          subtitleData = [];
          container.innerHTML = `<div class="text-red-400 text-center mt-12 text-xs px-4">❌ Missing File:<br><span class="font-mono text-gray-300 block mt-1">${filename}</span> must be saved in the same app folder.</div>`;
        });
    }

    function parseSubtitles(rawText) {
      subtitleData = [];
      const blocks = rawText.replace(/\r\n/g, '\n').split('\n\n');
      
      blocks.forEach((block) => {
        const lines = block.trim().split('\n');
        if (lines.length >= 3) {
          const id = lines[0];
          const timestampLine = lines[1];
          const text = lines.slice(2).join(' ');

          const timeMatch = timestampLine.match(/(\d+:\d+:\d+[\.,]\d+)\s+-->\s+(\d+:\d+:\d+[\.,]\d+)/);
          if (timeMatch) {
            subtitleData.push({
              id: id,
              startSeconds: timeToSeconds(timeMatch[1]), 
              endSeconds: timeToSeconds(timeMatch[2]),   
              text: text
            });
          }
        }
      });
      
      renderSubtitles();
    }

    function timeToSeconds(timeStr) {
      const parts = timeStr.replace(',', '.').split(':');
      return (parseFloat(parts[0]) * 3600) + (parseFloat(parts[1]) * 60) + parseFloat(parts[2]);
    }

    function renderSubtitles() {
      const container = document.getElementById('subsContainer');
      container.innerHTML = '';

      if (subtitleData.length === 0) {
        container.innerHTML = '<div class="text-gray-500 text-center mt-12 text-xs">Subtitle template structure is empty.</div>';
        return;
      }

      subtitleData.forEach((sub, index) => {
        const row = document.createElement('div');
        row.id = `sub-row-${index}`;
        row.className = "block bg-gray-900 border border-gray-800 rounded p-2 min-h-[38px] transition duration-150";
        
        row.onclick = () => {
          stopAtTime = null; 
          lastActiveIndex = -1; 
          seekTo(sub.startSeconds);
        };
        
        row.innerHTML = `
          <div class="text-gray-200 text-xs break-words leading-relaxed font-medium">
            ${escapeHtml(sub.text)}
          </div>
        `;
        container.appendChild(row);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function seekTo(seconds) {
      if (player && typeof player.seekTo === 'function') {
        player.seekTo(seconds, true);
        player.playVideo();
      }
    }

    /* --- Media Control Interactions Functions --- */

    function togglePlayPause() {
      if (!player || typeof player.getPlayerState !== 'function') return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      } else {
        stopAtTime = null; 
        player.playVideo();
      }
    }

    function navigateSentence(direction) {
      if (subtitleData.length === 0 || !player) return;
      stopAtTime = null; 

      let targetIndex = 0;
      
      if (lastActiveIndex !== -1) {
        targetIndex = lastActiveIndex + direction;
      } else {
        const currentTime = player.getCurrentTime();
        if (direction > 0) {
          targetIndex = subtitleData.findIndex(sub => sub.startSeconds > currentTime);
          if (targetIndex === -1) targetIndex = subtitleData.length - 1;
        } else {
          for (let i = subtitleData.length - 1; i >= 0; i--) {
            if (subtitleData[i].startSeconds < currentTime) {
              targetIndex = i;
              break;
            }
          }
        }
      }

      if (targetIndex < 0) targetIndex = 0;
      if (targetIndex >= subtitleData.length) targetIndex = subtitleData.length - 1;

      lastActiveIndex = -1; 
      seekTo(subtitleData[targetIndex].startSeconds);
    }

    function replayCurrentSentence() {
      if (subtitleData.length === 0 || !player || lastActiveIndex === -1) return;
      
      const currentSentence = subtitleData[lastActiveIndex];
      stopAtTime = currentSentence.endSeconds;
      
      lastActiveIndex = -1; 
      seekTo(currentSentence.startSeconds);
    }
  </script>
</body>
</html>
